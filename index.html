<!DOCTYPE html>
<html lang="id">
<head>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  color:white;
  overflow-x:hidden;

  background:
  radial-gradient(circle at 20% 20%, rgba(56,189,248,0.25), transparent 40%),
  radial-gradient(circle at 80% 30%, rgba(34,197,94,0.2), transparent 40%),
  linear-gradient(135deg,#020617,#020617,#0f172a);
}

/* CONTAINER */
.container{
  max-width:500px;
  margin:auto;
  padding:20px 15px;
}

/* CARD */
.card{
  background:rgba(15,23,42,0.9);
  border-radius:20px;
  padding:20px;
  box-shadow:0 0 40px rgba(56,189,248,.2);
  border:1px solid rgba(56,189,248,.4);
  animation:fadeIn 1s ease;
}

/* TITLE */
.title{
  text-align:center;
  font-size:20px;
  font-weight:900;
  color:#38bdf8;
}

/* IMAGE */
.hero img{
  width:100%;
  border-radius:14px;
  margin-top:10px;
  box-shadow:0 0 20px rgba(56,189,248,.5);
}

/* INFO */
.info{
  text-align:center;
  margin-top:10px;
  font-size:13px;
}

.live{ color:#22c55e; }
.wd{ color:#facc15; }

/* BUTTON */
.btn{
  display:block;
  text-align:center;
  margin-top:12px;
  padding:14px;
  border-radius:30px;
  font-weight:bold;
  text-decoration:none;
  color:#020617;
  animation:pulse 2s infinite;
}

.telegram{
  background:linear-gradient(90deg,#38bdf8,#2563eb);
}

.whatsapp{
  background:linear-gradient(90deg,#22c55e,#15803d);
}

/* COUNTDOWN */
#countdown{
  text-align:center;
  margin-top:12px;
  color:#f87171;
}

/* FLOAT GIF */
.float-gif{
  position:fixed;
  bottom:15px;
  right:10px;
  z-index:999;
}

.float-gif img{
  width:240px;
  border-radius:12px;
  box-shadow:0 0 40px rgba(34,197,94,.9);
  animation:floatAnim 1.8s infinite ease-in-out;
}

/* POPUP */
.popup{
  position:fixed;
  bottom:100px;
  left:10px;
  background:#020617;
  padding:10px 14px;
  border-radius:10px;
  font-size:12px;
  box-shadow:0 0 15px rgba(56,189,248,.5);
  display:none;
}

/* ANIMATIONS */
@keyframes floatAnim{
  0%{transform:translateY(0);}
  50%{transform:translateY(-12px);}
  100%{transform:translateY(0);}
}

@keyframes pulse{
  0%{box-shadow:0 0 10px rgba(255,255,255,.3);}
  50%{box-shadow:0 0 25px rgba(255,255,255,.8);}
  100%{box-shadow:0 0 10px rgba(255,255,255,.3);}
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <div class="title">MAUSLOT EXCLUSIVE</div>

      <img src="https://i.imgur.com/KnFWtRZ.png">
    </div>

    <div class="info">
      🎯 Bonus cair setiap hari – langsung gas!
      <div class="live">🔥 124 Member sedang online</div>
      <div class="wd">💰 WD terakhir Rp2.350.000</div>
    </div>

    <a href="https://urlmsshorten.com/telegram-official" class="btn telegram">
      📩 MASUK TELEGRAM
    </a>

    <a href="https://urlmsshorten.com/whatsapp-official" class="btn whatsapp">
      💬 HUBUNGI WHATSAPP
    </a>

    <div id="countdown"></div>

  </div>
</div>

<!-- FLOAT -->
<a href="https://urlmsshorten.com/whatsapp-official" class="float-gif">
  <img src="https://itslunamoon88.github.io/FOLLOW_WA/MS018.gif">
</a>

<!-- POPUP -->
<div id="popup" class="popup"></div>

<script>
// countdown
let time = 780;
setInterval(()=>{
  let m = Math.floor(time/60);
  let s = time%60;
  document.getElementById("countdown").innerHTML =
  "⏰ Promo berakhir dalam: " + m + ":" + (s<10?"0"+s:s);
  time--;
},1000);

// popup random
let names = ["Budi","Andi","Rizky","Doni","Agus","Fajar","Ilham"];
setInterval(()=>{
  let randomName = names[Math.floor(Math.random()*names.length)];
  let amount = Math.floor(Math.random()*3000000)+500000;
  let popup = document.getElementById("popup");

  popup.innerHTML = "💰 "+randomName+" WD Rp"+amount.toLocaleString();
  popup.style.display="block";

  setTimeout(()=>popup.style.display="none",3000);
},5000);
</script>

</body>
</html>
