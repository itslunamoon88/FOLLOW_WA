<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MAUSLOT EXCLUSIVE</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  color:white;
  overflow-x:hidden;
  background:
    linear-gradient(rgba(2,6,23,0.85), rgba(2,6,23,0.9)),
    url('https://i.imgur.com/uqWjwyk.jpeg') center/cover no-repeat fixed;
}

body::before, body::after{
  content:'';
  position:fixed;
  width:500px;
  height:500px;
  filter:blur(120px);
  opacity:0.25;
}
body::before{
  background:radial-gradient(circle,#38bdf8,transparent 70%);
  top:-120px; left:-120px;
}
body::after{
  background:radial-gradient(circle,#22c55e,transparent 70%);
  bottom:-120px; right:-120px;
}

.container{max-width:500px;margin:auto;padding:20px;position:relative;z-index:1;}
.card{
  background:rgba(15,23,42,0.9);
  border-radius:20px;
  padding:20px;
  box-shadow:0 0 40px rgba(56,189,248,.2);
  border:1px solid rgba(56,189,248,.4);
}

.title{text-align:center;font-size:20px;font-weight:900;color:#38bdf8;}

.hero img{
  width:100%;
  border-radius:14px;
  margin-top:10px;
  box-shadow:0 0 20px rgba(56,189,248,.5);
}

.info{text-align:center;margin-top:10px;font-size:13px;}
.live{color:#22c55e;}
.wd{color:#facc15;}

.btn{
  display:block;
  text-align:center;
  margin-top:12px;
  padding:14px;
  border-radius:30px;
  font-weight:bold;
  color:#020617;
  cursor:pointer;
  animation:pulse 2s infinite;
}

.telegram{background:linear-gradient(90deg,#38bdf8,#2563eb);}
.whatsapp{background:linear-gradient(90deg,#22c55e,#15803d);}

#countdown{text-align:center;margin-top:12px;color:#f87171;}

.float-gif{
  position:fixed;
  bottom:15px;
  right:10px;
  z-index:999;
}
.float-gif img{
  width:260px;
  border-radius:12px;
  box-shadow:0 0 50px rgba(34,197,94,1);
  cursor:pointer;
}

.popup{
  position:fixed;
  bottom:120px;
  left:10px;
  background:#020617;
  padding:10px 14px;
  border-radius:10px;
  font-size:12px;
  box-shadow:0 0 15px rgba(56,189,248,.5);
  display:none;
}

@keyframes pulse{
  0%{box-shadow:0 0 10px rgba(255,255,255,.3);}
  50%{box-shadow:0 0 25px rgba(255,255,255,.8);}
  100%{box-shadow:0 0 10px rgba(255,255,255,.3);}
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <div class="title">MAUSLOT EXCLUSIVE</div>

    <div class="hero">
      <img src="https://i.imgur.com/KnFWtRZ.png">
    </div>

    <div class="info">
      🎯 Bonus cair setiap hari – langsung gas!
      <div class="live">🔥 124 Member sedang online</div>
      <div class="wd">💰 WD terakhir Rp2.350.000</div>
    </div>

    <!-- TELEGRAM -->
    <div onclick="openTelegram()" class="btn telegram">
      📩 MASUK TELEGRAM
    </div>

    <!-- WHATSAPP -->
    <div onclick="openWhatsApp()" class="btn whatsapp">
      💬 HUBUNGI WHATSAPP
    </div>

    <div id="countdown"></div>

  </div>
</div>

<!-- FLOAT GIF -->
<div class="float-gif" onclick="openWhatsApp()">
  <img src="https://itslunamoon88.github.io/FOLLOW_WA/MS018.gif">
</div>

<div id="popup" class="popup"></div>

<script>
// 🔥 TELEGRAM
function openTelegram(){
  window.location.href = "tg://resolve?domain=mauslot"; // ganti username
  setTimeout(()=>{
    window.location.href = "https://t.me/mauslot";
  },1500);
}

// 🔥 WHATSAPP
function openWhatsApp(){
  window.location.href = "whatsapp://send?phone=628123456789"; // ganti nomor
  setTimeout(()=>{
    window.location.href = "https://wa.me/628123456789";
  },1500);
}

// countdown
let time = 780;
setInterval(()=>{
  let m = Math.floor(time/60);
  let s = time%60;
  document.getElementById("countdown").innerHTML =
  "⏰ Promo berakhir dalam: " + m + ":" + (s<10?"0"+s:s);
  time--;
},1000);

// popup WD
let names = ["Budi","Andi","Rizky","Doni","Agus","Fajar"];
setInterval(()=>{
  let popup = document.getElementById("popup");
  let name = names[Math.floor(Math.random()*names.length)];
  let amount = Math.floor(Math.random()*3000000)+500000;

  popup.innerHTML = "💰 "+name+" berhasil WD Rp"+amount.toLocaleString();
  popup.style.display="block";
  setTimeout(()=>popup.style.display="none",3000);
},4000);
</script>

</body>
</html>
