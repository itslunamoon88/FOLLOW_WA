<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta property="og:title" content="🔥 BONUS 100% HARI INI SAJA!">
<meta property="og:description" content="💸 Banyak member WD hari ini! Slot terbatas, jangan sampai ketinggalan!">
<meta property="og:image" content="https://itslunamoon88.github.io/FOLLOW_WA/bonus100.png">

<title>MAUSLOT EXCLUSIVE</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  color:#fff;
  background:
    linear-gradient(rgba(2,6,23,0.45), rgba(2,6,23,0.55)),
    url('https://i.imgur.com/uqWjwyk.jpeg') center/cover no-repeat fixed;
}

.container{max-width:500px;margin:auto;padding:18px;}
.card{
  background:rgba(15,23,42,0.9);
  border-radius:20px;
  padding:18px;
  text-align:center;
  box-shadow:0 0 40px rgba(56,189,248,.25);
  border:1px solid rgba(56,189,248,.35);
}

.title{font-size:20px;font-weight:900;color:#38bdf8;}
.hero img{width:100%;border-radius:12px;margin-top:10px;}

.warning{
  margin-top:10px;
  color:#facc15;
  font-weight:bold;
  animation:blink 1s infinite;
}

.live{color:#22c55e;margin-top:6px;}
.wd{color:#facc15;}

.btn{
  display:block;
  margin-top:12px;
  padding:14px;
  border-radius:30px;
  font-weight:bold;
  cursor:pointer;
  animation:pulse 1.5s infinite;
}

.telegram{background:linear-gradient(90deg,#38bdf8,#2563eb);}
.whatsapp{background:linear-gradient(90deg,#22c55e,#15803d);}

#countdown{margin-top:10px;color:#f87171;font-weight:bold;}

.float-gif{
  position:fixed;
  bottom:12px;
  right:10px;
  z-index:999;
}
.float-gif img{
  width:240px;
  border-radius:12px;
  box-shadow:0 0 40px rgba(34,197,94,.9);
  cursor:pointer;
}

.popup{
  position:fixed;
  bottom:110px;
  left:10px;
  background:#020617;
  padding:10px 14px;
  border-radius:12px;
  font-size:12px;
  box-shadow:0 0 15px rgba(56,189,248,.6);
  display:none;
}

.money{
  position:fixed;
  top:-50px;
  font-size:22px;
  animation:fall 4s linear infinite;
}

@keyframes fall{
  0%{transform:translateY(0);}
  100%{transform:translateY(110vh);}
}

@keyframes pulse{
  0%{box-shadow:0 0 10px rgba(255,255,255,.3);}
  50%{box-shadow:0 0 25px rgba(255,255,255,.9);}
  100%{box-shadow:0 0 10px rgba(255,255,255,.3);}
}

@keyframes blink{
  0%,100%{opacity:1;}
  50%{opacity:.3;}
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <div class="title">🔥 BONUS 100% HARI INI</div>

    <div class="hero">
      <img src="https://i.imgur.com/KnFWtRZ.png">
    </div>

    <div class="warning">⚠️ SLOT HAMPIR PENUH! MASUK SEKARANG!</div>

    <div id="live" class="live">🔥 124 Member sedang online</div>
    <div class="wd">💰 WD terakhir Rp2.350.000</div>

    <div onclick="openTelegram()" class="btn telegram">
      📩 MASUK TELEGRAM SEKARANG
    </div>

    <div onclick="openWhatsApp()" class="btn whatsapp">
      💬 CHAT ADMIN SEKARANG
    </div>

    <div id="countdown"></div>

  </div>
</div>

<div class="float-gif" onclick="openWhatsApp()">
  <img src="https://itslunamoon88.github.io/FOLLOW_WA/MS018.gif">
</div>

<div id="popup" class="popup"></div>

<script>
// TELEGRAM
function openTelegram(){
  window.location.href="tg://resolve?domain=M4U_5L0T";
  setTimeout(()=>{window.location.href="https://t.me/M4U_5L0T";},1200);
}

// WHATSAPP
function openWhatsApp(){
  window.location.href="whatsapp://send?phone=6281915349831";
  setTimeout(()=>{window.location.href="https://wa.me/6281915349831";},1200);
}

// countdown
let time=600;
setInterval(()=>{
  let m=Math.floor(time/60), s=time%60;
  document.getElementById("countdown").innerHTML =
  "⏰ Promo berakhir: "+m+":"+(s<10?"0"+s:s);
  time--;
},1000);

// live counter
setInterval(()=>{
  let n = 110 + Math.floor(Math.random()*30);
  document.getElementById("live").innerHTML =
  "🔥 "+n+" Member sedang online";
},3000);

// popup WD
let names=["Budi","Andi","Rizky","Doni","Agus","Fajar"];
setInterval(()=>{
  let popup=document.getElementById("popup");
  let name=names[Math.floor(Math.random()*names.length)];
  let amount=Math.floor(Math.random()*3000000)+500000;

  popup.innerHTML="💰 "+name+" berhasil WD Rp"+amount.toLocaleString();
  popup.style.display="block";

  setTimeout(()=>popup.style.display="none",3000);
},3500);

// uang jatuh
setInterval(()=>{
  let el=document.createElement("div");
  el.className="money";
  el.style.left=Math.random()*100+"vw";
  el.innerHTML="💸";
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),4000);
},800);
</script>

</body>
</html>
